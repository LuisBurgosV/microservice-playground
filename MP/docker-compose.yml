name: MP

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mp-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "A282XMm@9TX!"
    volumes:
      - mp_sqlserver_data:/var/opt/mssql

volumes:
  mp_sqlserver_data: